<!DOCTYPE html>
<html lang="{{ site_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page_title }} — {{ site_title }}</title>
  {{#if page_description}}
  <meta name="description" content="{{ page_description }}">
  {{/if}}
  <link rel="stylesheet" href="/assets/theme/style.css">
  <link rel="stylesheet" href="/assets/theme/prism.css">
</head>
<body>
  <header>
    <nav>
      <a href="/">{{ site_title }}</a>
      <a href="/blog/">Blog</a>
    </nav>
  </header>
  <main>
    <article class="post">
      <header class="post-header">
        <h1>{{ page_title }}</h1>
        {{#if page_date}}<time>{{ page_date }}</time>{{/if}}
        {{#if page_author}}<span class="author">by {{ page_author }}</span>{{/if}}
      </header>
      <div class="post-content">{{ page_content }}</div>
    </article>
  </main>
  <footer>
    <p>Built with <a href="https://github.com/Anxiu0101/yuegui">Yuegui</a>.</p>
  </footer>
  <script src="/assets/theme/prism.js"></script>
</body>
</html>
